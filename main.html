<!DOCTYPE html>
<html>
<head>
  <title>Planet Maps</title>
</head>
<body>

  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSYt7Vv9B1BQ-7nP8-TEI8aYSIV0H8SbHcxtw&s" alt="Solar System" usemap="#solarmap">

  <map name="solarmap">

    <!-- Sun (rectangle) -->
    <area shape="rect"   coords="0,100,90,580"        href="sun.htm"     alt="Sun">

    <!-- Planets (circles: x, y, radius) -->
    <area shape="circle" coords="110,325,18"           href="mercury.htm" alt="Mercury">
    <area shape="circle" coords="180,325,26"           href="venus.htm"   alt="Venus">
    <area shape="circle" coords="260,325,28"           href="earth.htm"   alt="Earth">
    <area shape="circle" coords="340,325,20"           href="mars.htm"    alt="Mars">
    <area shape="circle" coords="450,325,55"           href="jupiter.htm" alt="Jupiter">
    <area shape="circle" coords="570,325,45"           href="saturn.htm"  alt="Saturn">
    <area shape="circle" coords="670,325,35"           href="uranus.htm"  alt="Uranus">
    <area shape="circle" coords="750,325,32"           href="neptune.htm" alt="Neptune">

    <!-- Dwarf Planets (circles) -->
    <area shape="circle" coords="820,325,12"           href="pluto.htm"   alt="Pluto">
    <area shape="circle" coords="860,325,10"           href="eris.htm"    alt="Eris">
    <area shape="circle" coords="900,325,9"            href="ceres.htm"   alt="Ceres">

  </map>

</body>
</html>
